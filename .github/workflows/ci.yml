name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System deps (egui/wgpu on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Build + test are the gates. The codebase uses intentional non-rustfmt formatting
      # (compact single-line struct literals), so `cargo fmt --check` is deliberately NOT a
      # gate here. Clippy runs advisory-only (does not fail the build) so regressions are
      # visible without blocking on pre-existing lint debt.
      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Clippy (advisory)
        run: cargo clippy --workspace --all-targets || true
