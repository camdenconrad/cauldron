<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg-rterm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2830"/>
      <stop offset="1" stop-color="#17161a"/>
    </linearGradient>
  </defs>
  <!-- terminal window -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg-rterm)"/>
  <rect x="5" y="5" width="54" height="20" rx="13" fill="#ffffff" opacity="0.05"/>
  <!-- title-bar dots (autumn traffic lights) -->
  <circle cx="15" cy="15" r="2.6" fill="#c5522e"/>
  <circle cx="24" cy="15" r="2.6" fill="#d9a441"/>
  <circle cx="33" cy="15" r="2.6" fill="#966eb8"/>
  <!-- prompt chevron -->
  <polyline points="15 33 23 40 15 47"
            fill="none" stroke="#e96e2c" stroke-width="4.5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- cursor bar -->
  <rect x="29" y="43.5" width="18" height="4.5" rx="2.25" fill="#eeebe8" opacity="0.9"/>
</svg>
