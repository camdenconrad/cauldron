<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- cauldron — the Rune IDE. Mark: a ringed planet — flat 2D astronomy on the family shell.
       Orange globe (two-tone flat shading), purple ring passing behind AND in front, four-point
       stars. Orange/purple/near-black = space + halloween in one palette. README.md regenerates. -->

  <!-- shell -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="#1d1b22"/>

  <!-- stars (four-point sparks + dots) -->
  <path d="M15 15 l0.9 3.1 l3.1 0.9 l-3.1 0.9 l-0.9 3.1 l-0.9 -3.1 l-3.1 -0.9 l3.1 -0.9 Z"
        fill="#e96e2c" opacity="0.9"/>
  <path d="M49.5 12.5 l0.7 2.3 l2.3 0.7 l-2.3 0.7 l-0.7 2.3 l-0.7 -2.3 l-2.3 -0.7 l2.3 -0.7 Z"
        fill="#eeebe8" opacity="0.75"/>
  <circle cx="12.5" cy="46.5" r="1.2" fill="#eeebe8" opacity="0.55"/>
  <circle cx="53.5" cy="27.0" r="1.0" fill="#e96e2c" opacity="0.7"/>

  <!-- the ring system, tilted; BACK half first (planet will cover its middle) -->
  <g transform="rotate(-18 32 36)">
    <ellipse cx="32" cy="36" rx="21.5" ry="7" fill="none" stroke="#8a5bb0" stroke-width="3"/>
  </g>

  <!-- planet: flat orange globe with a darker terminator crescent (two-tone flat shading) -->
  <circle cx="32" cy="36" r="12.5" fill="#e96e2c"/>
  <path d="M 24.4 45.9 a 12.5 12.5 0 0 0 17.5 -17.5 a 15 15 0 0 1 -17.5 17.5 Z" fill="#c8551d"/>

  <!-- ring FRONT half, redrawn over the globe -->
  <g transform="rotate(-18 32 36)">
    <path d="M 10.5 36 A 21.5 7 0 0 0 53.5 36"
          fill="none" stroke="#8a5bb0" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
